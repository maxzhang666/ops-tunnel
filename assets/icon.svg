<svg id="app-icon-svg" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <!-- 正常的质感暗色背景 -->
                            <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#1E1E28"/>
                                <stop offset="100%" stop-color="#0A0A10"/>
                            </linearGradient>
                            <!-- 赛博霓虹渐变 -->
                            <linearGradient id="neonMain" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#00F0FF"/>
                                <stop offset="50%" stop-color="#7000FF"/>
                                <stop offset="100%" stop-color="#FF0055"/>
                            </linearGradient>
                            <!-- 多层发光滤镜 -->
                            <filter id="glowMain" x="-50%" y="-50%" width="200%" height="200%">
                                <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur1"/>
                                <feGaussianBlur in="SourceGraphic" stdDeviation="30" result="blur2"/>
                                <feGaussianBlur in="SourceGraphic" stdDeviation="60" result="blur3"/>
                                <feGaussianBlur in="SourceGraphic" stdDeviation="90" result="blur4"/>
                                <feMerge>
                                    <feMergeNode in="blur4"/>
                                    <feMergeNode in="blur3"/>
                                    <feMergeNode in="blur2"/>
                                    <feMergeNode in="blur1"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>

                        <!-- 背景层：圆角矩形 -->
                        <rect width="1024" height="1024" rx="225" fill="url(#bgGrad)"/>
                        <!-- 玻璃质感内描边 -->
                        <rect x="2" y="2" width="1020" height="1020" rx="223" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="4"/>

                        <g transform="translate(0, 0)">
                            <!-- 外层强散发光 (Stroke) -->
                            <path d="M 620 160 L 320 560 L 500 560 L 380 860 L 710 420 L 530 420 Z" fill="none" stroke="url(#neonMain)" stroke-width="30" stroke-linejoin="round" filter="url(#glowMain)" opacity="0.8"/>
                            
                            <!-- 内层霓虹本体颜色 -->
                            <path d="M 620 160 L 320 560 L 500 560 L 380 860 L 710 420 L 530 420 Z" fill="url(#neonMain)" filter="url(#glowMain)" opacity="1"/>
                            
                            <!-- 绝对高温白/青色核心 (展现极度尖锐) -->
                            <path d="M 620 160 L 320 560 L 500 560 L 380 860 L 710 420 L 530 420 Z" fill="#F4FFFF" opacity="0.95"/>
                        </g>
                    </svg>